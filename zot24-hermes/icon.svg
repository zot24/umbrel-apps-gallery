<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256">
  <defs>
    <filter id="glow">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="glow-soft">
      <feGaussianBlur stdDeviation="12" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="256" height="256" rx="48" fill="#060a0d"/>

  <!-- Subtle grid -->
  <pattern id="grid" width="16" height="16" patternUnits="userSpaceOnUse">
    <path d="M 16 0 L 0 0 0 16" fill="none" stroke="#1a2530" stroke-width="0.5" opacity="0.4"/>
  </pattern>
  <rect width="256" height="256" rx="48" fill="url(#grid)"/>

  <!-- Center glow -->
  <circle cx="118" cy="128" r="60" fill="rgba(80,255,168,0.05)" filter="url(#glow-soft)"/>

  <!-- Terminal prompt > -->
  <polyline
    points="80,92 130,128 80,164"
    fill="none"
    stroke="#50ffa8"
    stroke-width="12"
    stroke-linecap="round"
    stroke-linejoin="round"
    filter="url(#glow)"
  />

  <!-- Blinking cursor line -->
  <line x1="148" y1="100" x2="148" y2="156" stroke="#50ffa8" stroke-width="10" stroke-linecap="round" filter="url(#glow)" opacity="0.7"/>
</svg>
